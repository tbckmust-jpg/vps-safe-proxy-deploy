name: ci

on:
  push:
  pull_request:

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck shfmt

      - name: Ensure local executable bits
        run: chmod +x bootstrap.sh install.sh tests/mocks/*

      - name: Bash syntax
        run: bash -n bootstrap.sh install.sh lib/*.sh

      - name: ShellCheck
        run: shellcheck bootstrap.sh install.sh lib/*.sh

      - name: shfmt
        run: shfmt -d bootstrap.sh install.sh lib/*.sh

      - name: Bats
        run: bats tests/bats
